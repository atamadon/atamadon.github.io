  - name: navigation
    label: Navigation
    type: file
    path: _data/navigation.yml
    format: yaml
    description: PI-editable primary navigation. Keep labels public-facing and keep URLs aligned with the current site structure.
    fields:
      - name: primary
        label: Primary navigation
        type: object
        list: true
        fields:
          - name: title
            label: Title
            type: string
            required: true
            description: Public navigation label shown in the site header.
          - name: url
            label: URL
            type: string
            required: true
            description: Site-relative or external destination for this navigation item.
          - name: children
            label: Dropdown items
            type: object
            list: true
            fields:
              - name: title
                label: Title
                type: string
                required: true
                description: Public label for the dropdown item.
              - name: url
                label: URL
                type: string
                required: true
