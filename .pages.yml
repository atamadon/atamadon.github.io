              - name: surface_100
                label: Tertiary surface
                type: string
              - name: surface_tint
                label: Tinted surface
                type: string
              - name: header_bg
                label: Header meta color
                type: string
              - name: header_surface
                label: Header surface
                type: string
              - name: header_border
                label: Header border
                type: string
              - name: header_text
                label: Header text
