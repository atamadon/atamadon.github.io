            label: Title
            type: string
          - name: pdb_id
            label: PDB ID
            type: string
          - name: source
            label: Local structure file
            type: string
            required: true
          - name: format
            label: Format
            type: string
            required: true
          - name: caption
            label: Caption
            type: text
          - name: poster_image
            label: Poster image
            type: image
          - name: height
            label: Height
            type: string
          - name: background
