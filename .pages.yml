              - name: surface_50
                label: Secondary surface
                type: string
              - name: surface_100
                label: Tertiary surface
                type: string
              - name: surface_tint
                label: Tinted surface
                type: string
              - name: header_bg
                label: Header meta color
                type: string
              - name: header_surface
                label: Header surface
                type: string
              - name: header_border
                label: Header border
                type: string
              - name: header_text
                label: Header text
                type: string
              - name: header_muted
                label: Header muted text
                type: string
              - name: theme_toggle_ring
                label: Toggle focus ring
                type: string
              - name: body_gradient_top
                label: Top page gradient
                type: string
              - name: body_gradient_mid
                label: Mid page gradient
                type: string
          - name: dark
            label: Dark theme colors
            type: object
            fields:
              - name: berkeley_blue
                label: Berkeley blue
                type: string
              - name: berkeley_gold
                label: Berkeley gold
                type: string
              - name: accent_blue
                label: Accent blue
                type: string
              - name: accent_gold
                label: Accent gold
                type: string
              - name: ink_900
                label: Body text
