media:
  - name: images
    input: assets/images
    output: /assets/images
  - name: logos
    input: assets/logos
    output: /assets/logos
  - name: files
    input: assets/files
    output: /assets/files
    categories: [ document ]

components:
  embed_blocks:
    label: Embedded content
    type: block
    list: true
    blockKey: type
    blocks:
      - name: molstar
        label: Mol* Viewer
        component: embed_molstar
      - name: video
        label: Video
        component: embed_video
      - name: document
        label: Document
        component: embed_document
      - name: map
        label: Map
        component: embed_map
  embed_molstar:
    label: Mol* Viewer
    type: object
    fields:
      - name: eyebrow
        label: Eyebrow
        type: string
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
      - name: structure_id
        label: Structure ID
        type: string
        required: true
      - name: caption
        label: Caption
        type: text
  embed_video:
    label: Video
    type: object
    fields:
      - name: eyebrow
        label: Eyebrow
        type: string
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
      - name: embed_url
        label: Embed URL
        type: string
        required: true
      - name: aspect_ratio
        label: Aspect ratio
        type: string
      - name: caption
        label: Caption
        type: text
  embed_document:
    label: Document
    type: object
    fields:
      - name: eyebrow
        label: Eyebrow
        type: string
      - name: title
        label: Title
        type: string
      - name: summary
        label: Summary
        type: text
      - name: file
        label: Local file
        type: file
      - name: url
        label: External URL
        type: string
      - name: preview_url
        label: Preview URL
        type: string
      - name: aspect_ratio
        label: Aspect ratio
        type: string
      - name: cta_label
        label: Button label
        type: string
      - name: caption
        label: Caption
        type: text
  embed_map:
    label: Map
    type: object
    fields:
      - name: eyebrow
        label: Eyebrow
        type: string
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
      - name: embed_url
        label: Embed URL
        type: string
        required: true
      - name: aspect_ratio
        label: Aspect ratio
        type: string
      - name: caption
        label: Caption
        type: text

content:
  - name: home
    label: Home
    type: file
    path: index.md
    format: yaml-frontmatter
    description: Maintainer-managed landing page with data-driven sections and hero layout.
    fields:
      - name: layout
        label: Layout
        type: string
        hidden: true
        default: default
      - name: title
        label: Page title
        type: string
        required: true
      - name: body
        label: Page content
        type: code
        options:
          language: markdown
      - name: embeds
        label: Embedded content
        component: embed_blocks

  - name: research_landing
    label: Research Landing Page
    type: file
    path: research/index.md
    format: yaml-frontmatter
    description: Maintainer-managed page. Keep this as code because it uses structured links and section composition.
    fields:
      - name: layout
        label: Layout
        type: string
        hidden: true
        default: default
      - name: title
        label: Page title
        type: string
        required: true
      - name: body
        label: Page content
        type: code
        options:
          language: markdown
      - name: embeds
        label: Embedded content
        component: embed_blocks

  - name: contact
    label: Contact Page
    type: file
    path: contact/index.md
    format: yaml-frontmatter
    description: Maintainer-managed page with structured contact cards and map embed.
    fields:
      - name: layout
        label: Layout
        type: string
        hidden: true
        default: default
      - name: title
        label: Page title
        type: string
        required: true
      - name: body
        label: Page content
        type: code
        options:
          language: markdown
      - name: embeds
        label: Embedded content
        component: embed_blocks

  - name: teaching
    label: Teaching Page
    type: file
    path: teaching/index.md
    format: yaml-frontmatter
    description: PI-editable teaching page. This is a good demo surface for routine public-content edits.
    fields:
      - name: layout
        label: Layout
        type: string
        hidden: true
        default: default
      - name: title
        label: Page title
        type: string
        required: true
      - name: body
        label: Page content
        type: rich-text
      - name: embeds
        label: Embedded content
        component: embed_blocks

  - name: news_landing
    label: News Landing Page
    type: file
    path: news/index.md
    format: yaml-frontmatter
    description: Maintainer-managed archive page. News entries themselves should be edited in News Posts below.
    fields:
      - name: layout
        label: Layout
        type: string
        hidden: true
        default: default
      - name: title
        label: Page title
        type: string
        required: true
      - name: body
        label: Page content
        type: code
        options:
          language: markdown
      - name: embeds
        label: Embedded content
        component: embed_blocks

  - name: research_topics
    label: Research Topics
    type: collection
    path: research
    subfolders: false
    exclude:
      - index.md
    filename: "{primary}.md"
    format: yaml-frontmatter
    description: Research topic pages stay Markdown-based because they may contain structured links and data-backed embeds.
    view:
      fields: [title]
      primary: title
      sort: [title]
    fields:
      - name: layout
        label: Layout
        type: string
        hidden: true
        default: default
      - name: title
        label: Topic title
        type: string
        required: true
      - name: body
        label: Topic content
        type: code
        options:
          language: markdown
      - name: embeds
        label: Embedded content
        component: embed_blocks

  - name: team
    label: Team
    type: collection
    path: _team
    subfolders: true
    filename: "{berkeley_username}.md"
    format: yaml-frontmatter
    description: PI/CMS-owned public people records only. Do not put private IT onboarding or account-provisioning data here.
    view:
      fields: [name, role, active]
      primary: name
      sort: [active, role, join_date, leave_date, name]
    fields:
      - name: berkeley_username
        label: Berkeley username
        type: string
        required: true
        description: Stable public profile key, usually derived from the Berkeley email local part.
        pattern:
          regex: "^[a-z0-9-]+$"
          message: Use lowercase letters, numbers, and hyphens only.
      - name: name
        label: Name
        type: string
        required: true
        description: Public display name for the profile card and team page.
      - name: role
        label: Role
        type: select
        required: true
        options:
          values:
            - label: Principal Investigator
              value: Principal Investigator
            - label: Postdoc
              value: Postdoc
            - label: Graduate Student
              value: Graduate Student
            - label: Undergraduate Student
              value: Undergraduate Student
            - label: Alumni
              value: Alumni
      - name: status
        label: Status
        type: string
        required: true
        description: Public title or training status shown on the team card.
      - name: groups
        label: Research groups
        type: select
        required: false
        list: true
        description: Public research-area tags only. Active current-team entries should use this; historical alumni records may leave it blank.
        options:
          values:
            - label: Molecular Dynamics
              value: molecular-dynamics
            - label: Statistical Learning & Biological Language Processing
              value: ai
            - label: Microbiome & Bacterial Community Biomechanics
              value: microbiome
      - name: email
        label: Email
        type: string
        required: false
        description: Public-safe contact email. Active current-team entries should include this. Historical alumni records may leave it blank. The site only renders it when `Show public email link` is enabled.
        pattern:
          regex: "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
          message: Enter a valid email address.
      - name: image
        label: Profile image
        type: image
        required: false
        description: Public headshot for the website team card. Active current-team entries should include this; historical alumni records may leave it blank.
      - name: active
        label: Show publicly
        type: boolean
        default: true
      - name: join_date
        label: Join date
        type: date
        hidden: true
        description: Maintainer-only internal chronology field used to rank active members.
      - name: leave_date
        label: Leave date
        type: date
        hidden: true
        description: Maintainer-only internal chronology field used to rank alumni and other inactive members.
      - name: sort_order
        label: Legacy sort order
        type: number
        required: false
        hidden: true
        description: Legacy fallback ordering only. Public ranking should come from join or leave date.
      - name: bio_short
        label: Short bio
        type: text
        description: One short public summary used on the team card.
      - name: bio_long
        label: Long bio
        type: text
        description: Longer public biography text for the profile page.
      - name: show_email
        label: Show public email link
        type: boolean
        default: false
        description: Controls whether the website renders a mailto link for this profile.
      - name: website
        label: Website
        type: string
        pattern:
          regex: "^https?://[^\\s]+$"
          message: Use a full URL starting with http:// or https://.
      - name: scholar
        label: Google Scholar URL
        type: string
        pattern:
          regex: "^https?://[^\\s]+$"
          message: Use a full URL starting with http:// or https://.
      - name: orcid
        label: ORCID URL
        type: string
        pattern:
          regex: "^https?://[^\\s]+$"
          message: Use a full URL starting with http:// or https://.
      - name: linkedin
        label: LinkedIn URL
        type: string
        pattern:
          regex: "^https?://[^\\s]+$"
          message: Use a full URL starting with http:// or https://.
      - name: github
        label: GitHub URL
        type: string
        pattern:
          regex: "^https?://[^\\s]+$"
          message: Use a full URL starting with http:// or https://.
      - name: placeholder
        label: Placeholder profile
        type: boolean
        hidden: true
        default: false
        description: Maintainer-only temporary flag for incomplete public profiles.
      - name: body
        label: Profile body
        type: rich-text
        description: Optional long-form profile content for the dedicated member page.

  - name: posts
    label: News Posts
    type: collection
    path: _posts
    subfolders: false
    exclude:
      - .gitkeep
    filename: "{year}-{month}-{day}-{primary}.md"
    format: yaml-frontmatter
    description: PI-editable news entries for the public archive. New posts should be creatable with title, date, and body alone; recovered legacy entries may stay text-only until an editor uploads a featured image later.
    view:
      fields: [title, date]
      primary: title
      sort: [date, title]
    fields:
      - name: layout
        label: Layout
        type: string
        hidden: true
        default: post
      - name: title
        label: Post title
        type: string
        required: true
        description: Public headline shown in the archive and feed.
      - name: date
        label: Publish date
        type: date
        required: true
        description: Public publish date shown in the archive timeline.
      - name: featured_image
        label: Featured image
        type: image
        description: Optional lead image for the archive card. Leave blank for text-only recovered entries and add it later in Pages CMS when an approved image is available.
      - name: featured_image_alt
        label: Featured image alt text
        type: string
        description: Required whenever a featured image is present. Describe the image content, not the filename.
      - name: body
        label: Post content
        type: rich-text
        description: Keep posts concise and public-facing. The first paragraph becomes the archive summary. Use embeds only when they materially help.
      - name: embeds
        label: Embedded content
        component: embed_blocks

  - name: site_settings
    label: Site Settings
    type: file
    path: _data/site.yml
    format: yaml
    description: Site-wide public metadata, contact details, governance links, and publication source settings. This is part of the core PI demo scope.
    fields:
      - name: name
        label: Site name
        type: string
        required: true
      - name: short_name
        label: Short name
        type: string
      - name: tagline
        label: Tagline
        type: string
      - name: description
        label: Description
        type: text
      - name: unit
        label: Unit
        type: object
        fields:
          - name: department
            label: Department
            type: string
          - name: university
            label: University
            type: string
      - name: header
        label: Header
        type: object
        fields:
          - name: title
            label: Main title
            type: object
            fields:
              - name: label
                label: Title text
                type: string
                required: true
              - name: url
                label: Title URL
                type: string
                required: true
          - name: subtitles
            label: Subtitle links
            type: object
            list: true
            fields:
              - name: label
                label: Subtitle text
                type: string
                required: true
              - name: url
                label: Subtitle URL
                type: string
                required: true
      - name: contact
        label: Contact
        type: object
        fields:
          - name: email
            label: Email
            type: string
          - name: phone
            label: Phone
            type: string
          - name: fax
            label: Fax
            type: string
          - name: address_lines
            label: Address lines
            type: string
            list: true
          - name: map_embed_url
            label: Map embed URL
            type: string
      - name: brand
        label: Brand
        type: object
        fields:
          - name: logo
            label: Logo
            type: image
            description: Lab logo used in the header home button.
      - name: accessibility
        label: Accessibility
        type: object
        fields:
          - name: report_url
            label: Report issue URL
            type: string
          - name: support_email
            label: Support email
            type: string
          - name: statement
            label: Accessibility statement
            type: text
      - name: governance
        label: Governance
        type: object
        fields:
          - name: privacy_url
            label: Privacy URL
            type: string
          - name: nondiscrimination_url
            label: Nondiscrimination URL
            type: string
      - name: principal_investigator
        label: Principal investigator
        type: object
        fields:
          - name: name
            label: Name
            type: string
          - name: display_name
            label: Display name
            type: string
          - name: berkeley_username
            label: Berkeley username
            type: string
          - name: affiliation
            label: Affiliation
            type: string
      - name: publications
        label: Publications
        type: object
        fields:
          - name: provider
            label: Provider
            type: string
          - name: query_name
            label: Query name
            type: string
          - name: affiliation_contains
            label: Affiliation filter
            type: string
          - name: author_id
            label: Author ID
            type: string
          - name: output_path
            label: Output path
            type: string
          - name: overrides_path
            label: Overrides path
            type: string
      - name: news
        label: News
        type: object
        fields:
          - name: migration_status
            label: Migration status
            type: select
            hidden: true
            description: Maintainer-facing note about the legacy news import state.
            options:
              values:
                - label: Pending WordPress backfill
                  value: pending_wordpress_backfill
                - label: Migration in progress
                  value: migration_in_progress
                - label: Migration complete
                  value: migration_complete

  - name: theme_settings
    label: Theme Settings
    type: file
    path: _data/theme.yml
    format: yaml
    description: Editor-safe design controls for the current visual system. Use this file for tuning, not redesign-level template changes.
    fields:
      - name: layout
        label: Layout
        type: object
        fields:
          - name: content_width
            label: Content width
            type: string
            description: Site-wide max content width, for example `72rem`.
      - name: radius
        label: Corner radius
        type: object
        fields:
          - name: card
            label: Card radius
            type: string
          - name: pill
            label: Pill radius
            type: string
      - name: shadows
        label: Shadows
        type: object
        fields:
          - name: light_card
            label: Light card shadow
            type: string
          - name: light_card_hover
            label: Light hover shadow
            type: string
          - name: dark_card
            label: Dark card shadow
            type: string
          - name: dark_card_hover
            label: Dark hover shadow
            type: string
      - name: motion
        label: Motion
        type: object
        fields:
          - name: enabled
            label: Enable motion
            type: boolean
            description: Turns site motion on or off without changing navigation behavior.
      - name: colors
        label: Colors
        type: object
        fields:
          - name: light
            label: Light theme colors
            type: object
