name: Refresh Generated Content

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4
          bundler-cache: true

      - name: Install gems
        run: bundle install

      - name: Regenerate publications
        run: ruby scripts/generate_publications.rb

      - name: Validate generated content
        run: |
          ruby scripts/validate_theme.rb
          ruby scripts/validate_team.rb
          ruby scripts/validate_embeds.rb
          ruby -Ilib test/test_publication_generator.rb
          ruby -Ilib test/test_theme_validator.rb
          ruby -Ilib test/test_team_validator.rb
          ruby -Ilib test/test_embed_validator.rb
          ruby -Ilib test/test_structures_config.rb
          bundle exec jekyll build --trace

      - name: Commit generated updates
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/generated/publications.json
          git commit -m "chore: refresh generated publications"
          git push
