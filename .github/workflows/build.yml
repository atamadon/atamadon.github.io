name: Build

on:
  push:
  pull_request:

jobs:
  jekyll-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4
          bundler-cache: true

      - name: Install gems
        run: bundle install

      - name: Build Jekyll site
        run: bundle exec jekyll build --trace
