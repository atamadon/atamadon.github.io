name: Build

on:
  push:
  pull_request:

jobs:
  jekyll-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4
          bundler-cache: true

      - name: Install gems
        run: bundle install

      - name: Validate team entries
        run: ruby scripts/validate_team.rb

      - name: Validate theme and site settings
        run: ruby scripts/validate_theme.rb

      - name: Validate embed blocks
        run: ruby scripts/validate_embeds.rb

      - name: Run generator and validator tests
        run: |
          ruby -Ilib test/test_publication_generator.rb
          ruby -Ilib test/test_theme_validator.rb
          ruby -Ilib test/test_team_validator.rb
          ruby -Ilib test/test_embed_validator.rb
          ruby -Ilib test/test_structures_config.rb

      - name: Build Jekyll site
        run: bundle exec jekyll build --trace
