<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhinovirus Viewer</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
        }
        h1 {
            font-size: 3em;
            color: #ffffff;
        }
        .ribbon {
            display: flex;
            justify-content: center;
            background-color: #1f1f1f;
            width: 100%;
            padding: 10px 0;
        }
        .ribbon a {
            color: #bb86fc;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.2em;
        }
        .ribbon a:hover {
            text-decoration: underline;
        }
        .content a {
            font-size: 1.5em;
            color: #bb86fc;
            text-decoration: none;
            margin-top: 20px;
        }
        .content a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Rhinovirus Viewer</h1>
    <div class="ribbon">
        <a href="#report">Report</a>
        <a href="https://jbrowse.org/jb2/docs/" target="_blank">JBrowse Documentation</a>
        <a href="#info">Info</a>
        <a href="#virus">Virus</a>
    </div>
    <div class="content">
        <a href="https://atamadon.github.io/jbrowse2" target="_blank">Go to JBrowse2 Instance</a>
    </div>
</body>
</html>
